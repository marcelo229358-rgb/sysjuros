# SysContabel — deploy na Render (teste gratuito)
# https://render.com/docs/blueprint-spec

databases:
  - name: syscontabel-db
    plan: free
    databaseName: syscontabel
    user: syscontabel

services:
  # API Node.js
  - type: web
    name: syscontabel-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start:render
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: syscontabel-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        fromService:
          type: web
          name: syscontabel-web
          envVarKey: RENDER_EXTERNAL_URL
      # WhatsApp (opcional — aponte para Evolution API externa, ex. Hostinger)
      - key: EVOLUTION_API_URL
        sync: false
      - key: EVOLUTION_API_KEY
        sync: false
      - key: EVOLUTION_INSTANCE
        value: syscontabel

  # Frontend React (site estático)
  - type: web
    name: syscontabel-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: syscontabel-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_EMPRESA_ID
        value: 1030c59f-503a-4dfc-ad8b-66c802060cd0
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
