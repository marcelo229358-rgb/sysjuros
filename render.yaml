# SysJuros — deploy na Render (teste gratuito)
# https://render.com/docs/blueprint-spec

databases:
  - name: sysjuros-db
    plan: free
    databaseName: sysjuros
    user: sysjuros

services:
  # API Node.js
  - type: web
    name: sysjuros-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start:render
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sysjuros-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        fromService:
          type: web
          name: sysjuros-web
          envVarKey: RENDER_EXTERNAL_URL
      # WhatsApp (opcional — aponte para Evolution API externa, ex. Hostinger)
      - key: EVOLUTION_API_URL
        sync: false
      - key: EVOLUTION_API_KEY
        sync: false
      - key: EVOLUTION_INSTANCE
        value: sysjuros

  # Frontend React (site estático)
  - type: web
    name: sysjuros-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: sysjuros-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_EMPRESA_ID
        value: 1030c59f-503a-4dfc-ad8b-66c802060cd0
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
